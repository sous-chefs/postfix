---
driver:
  name: vagrant

provisioner:
  name: policyfile_zero
  product_name: cinc
  enforce_idempotency: true
  multiple_converge: 2
  deprecations_as_errors: true
  policyfile: Policyfile.rb

verifier:
  name: inspec

platforms:
  - name: almalinux-8
  - name: almalinux-9
  - name: amazonlinux-2023
  - name: centos-stream-9
  - name: debian-11
  - name: debian-12
  - name: fedora-latest
  - name: opensuse-leap-15
  - name: rockylinux-8
  - name: rockylinux-9
  - name: ubuntu-20.04
  - name: ubuntu-22.04
  - name: ubuntu-24.04

suites:
  - name: default
    provisioner:
      named_run_list: default

  - name: aliases
    provisioner:
      named_run_list: aliases
    attributes:
      postfix:
        aliases:
          foo1: bar
          foo@bar: foo
          foo2: "|/usr/bin/bar"
          foo3: foo,bar
          foo4: foo@example.com
          foo5:
            - foo
            - bar

  - name: client
    provisioner:
      named_run_list: client

  - name: server
    provisioner:
      named_run_list: server

  - name: access
    provisioner:
      named_run_list: access

  - name: canonical
    provisioner:
      named_run_list: canonical
    attributes:
      postfix:
        recipient_canonical_map_entries:
          john: john@doe.com

  - name: sasl_auth_none
    provisioner:
      named_run_list: sasl_auth_none
    attributes:
      postfix:
        main:
          relayhost: "localhost"
          smtp_sasl_auth_enable: "yes"

  - name: sasl_auth_multiple
    provisioner:
      named_run_list: sasl_auth_multiple
    attributes:
      postfix:
        main:
          relayhost: "localhost"
          smtp_sasl_auth_enable: "yes"
        sasl:
          relayhost1:
            username: "kitchenuser"
            password: "not-a-real-thing"
          relayhost2:
            username: "anotherkitchenuser"
            password: "yet-not-a-real-thing"

  - name: sasl_auth_one
    provisioner:
      named_run_list: sasl_auth_one
    attributes:
      postfix:
        main:
          relayhost: "localhost"
          smtp_sasl_auth_enable: "yes"
        sasl:
          relayhost:
            username: "kitchenuser"
            password: "not-a-real-thing"
